<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkHub | Agregador Pro</title>
    <link rel="icon" type="image/x-icon" href="https://github.com/vmacagnani/api-pre-os/raw/main/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-mesh {
            background-color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, hsla(225,39%,30%,0.03) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(225,39%,30%,0.03) 0, transparent 50%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .loader-spin {
            border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6;
            border-radius: 50%; width: 32px; height: 32px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #loader-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8); z-index: 10000;
            flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(2px);
        }

        .link-card { position: relative; overflow: hidden; }
        .description-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(30, 41, 59, 0.95);
            color: white;
            padding: 0.75rem;
            font-size: 10px;
            font-weight: 500;
            text-align: center;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(4px);
        }
        .link-card:hover .description-overlay {
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-mesh min-h-screen text-slate-800 pb-20">

    <div id="loader-overlay">
        <div class="loader-spin"></div>
        <p class="mt-4 text-[10px] font-bold text-blue-600 animate-pulse uppercase tracking-widest">Sincronizando Link...</p>
    </div>

    <div class="container mx-auto max-w-5xl p-6">
        
        <header class="text-center mt-12 mb-16">
            <img src="https://raw.githubusercontent.com/avatek-m2m/apps-avatek/refs/heads/main/logo-avatek-azul-laranja.png" alt="Logo" class="mx-auto h-12 w-auto mb-6">
            <h1 class="text-3xl font-black italic tracking-tighter text-slate-900 uppercase">Link<span class="text-blue-600">Hub</span></h1>
            <p class="text-slate-400 text-sm font-medium italic mt-2 tracking-wide">Central de recursos e acessos rápidos.</p>
        </header>

        <div class="glass-card p-8 rounded-[2.5rem] shadow-sm mb-16 max-w-4xl mx-auto">
            <h2 class="text-[10px] font-black text-blue-600 uppercase tracking-[0.2em] mb-6 text-center">Adicionar Novo Recurso</h2>
            <form id="add-link-form" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="flex flex-col gap-1">
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Título</label>
                        <input type="text" name="title" placeholder="Ex: Planilha de Vendas" required class="bg-slate-50 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm border-none">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Tipo</label>
                        <select name="tipo" id="form-tipo" required class="bg-slate-50 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm border-none appearance-none">
                            <option value="Tabelas">Tabelas</option>
                            <option value="Ferramentas">Ferramentas</option>
                            <option value="Documentos">Documentos</option>
                            <option value="Acessos">Acessos</option>
                            <option value="Social">Social</option>
                            <option value="Planilhas">Planilhas</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-1 md:col-span-2">
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">URL (Endereço)</label>
                        <input type="url" name="url" placeholder="https://..." required class="bg-slate-50 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm border-none">
                    </div>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Descrição Curta (Hover)</label>
                    <input type="text" name="description" placeholder="Ex: Controle de estoque mensal v2" class="bg-slate-50 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm border-none">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl hover:bg-blue-700 shadow-xl shadow-blue-100 transition-all uppercase tracking-widest text-xs">
                    Salvar Link na Base
                </button>
            </form>
        </div>

        <div class="relative">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-slate-200 pb-6 gap-4">
                <h2 class="text-sm font-black text-slate-800 uppercase tracking-widest italic">Recursos Salvos</h2>
                
                <div class="flex items-center gap-3 w-full md:w-auto">
                    <div class="relative w-full md:w-64">
                        <input type="text" id="search-input" placeholder="Buscar recurso..." class="w-full bg-white/50 border border-slate-200 rounded-full py-2 px-4 pl-10 text-xs outline-none focus:ring-2 focus:ring-blue-400 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 absolute left-3 top-2.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    </div>
                    <button id="reload-button" class="p-2.5 hover:bg-white rounded-full transition-all text-slate-400 hover:text-blue-600 shadow-sm border border-slate-100">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
                    </button>
                </div>
            </div>
            
            <div id="loader" class="text-center py-20">
                <div class="loader-spin mx-auto"></div>
                <p class="mt-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Consultando Sheets...</p>
            </div>

            <div id="links-wrapper" class="space-y-12"></div>

            <div id="empty-state" class="hidden text-center py-20 glass-card rounded-[2.5rem]">
                <p class="text-slate-400 font-bold italic">Nenhum link encontrado.</p>
            </div>
        </div>
    </div>

    <script>
        const googleSheetWebAppUrl = 'https://script.google.com/macros/s/AKfycbz7E23u-0WZsK-1X58jnP2vWLNF5Mo45EouGmanyHur8eTtceykjH_38krU9elxV0Fu/exec';

        const form = document.getElementById('add-link-form');
        const linksWrapper = document.getElementById('links-wrapper');
        const loader = document.getElementById('loader');
        const overlay = document.getElementById('loader-overlay');
        const emptyState = document.getElementById('empty-state');
        const searchInput = document.getElementById('search-input');

        let allLinks = []; // Armazenamento global para busca

        function toggleOverlay(show) { overlay.style.display = show ? 'flex' : 'none'; }

        function renderLinks(links) {
            linksWrapper.innerHTML = '';
            if (links.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            const grupos = links.reduce((acc, link) => {
                const cat = link.tipo || 'Geral';
                if (!acc[cat]) acc[cat] = [];
                acc[cat].push(link);
                return acc;
            }, {});

            const categoriasOrdenadas = Object.keys(grupos).sort((a, b) => {
                if (a === 'Tabelas') return -1;
                if (b === 'Tabelas') return 1;
                return a.localeCompare(b);
            });

            categoriasOrdenadas.forEach(categoria => {
                const sectionHtml = `
                    <section class="animate-fadeIn">
                        <div class="flex items-center gap-4 mb-6">
                            <h3 class="text-[10px] font-black text-blue-500 uppercase tracking-[0.3em] whitespace-nowrap bg-blue-50 px-4 py-1.5 rounded-full border border-blue-100">${categoria}</h3>
                            <div class="h-[1px] w-full bg-slate-200"></div>
                        </div>
                        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
                            ${grupos[categoria].map(link => `
                                <a href="${link.url}" target="_blank" rel="noopener noreferrer" 
                                   class="link-card group glass-card flex flex-col items-center justify-center p-6 rounded-[2rem] hover:shadow-[0_20px_40px_rgba(59,130,246,0.1)] hover:border-blue-300 transition-all duration-300 aspect-square">
                                    
                                    <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mb-4 group-hover:scale-90 transition-all duration-300">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                                        </svg>
                                    </div>
                                    <h3 class="font-bold text-[11px] text-slate-800 uppercase tracking-tighter text-center leading-tight break-words w-full px-2">${link.titulo}</h3>
                                    
                                    ${link.descricao ? `<div class="description-overlay uppercase tracking-widest leading-relaxed">${link.descricao}</div>` : ''}
                                </a>
                            `).join('')}
                        </div>
                    </section>
                `;
                linksWrapper.insertAdjacentHTML('beforeend', sectionHtml);
            });
        }

        async function fetchLinks() {
            loader.classList.remove('hidden');
            linksWrapper.innerHTML = '';
            searchInput.value = ''; 
            try {
                const response = await fetch(`${googleSheetWebAppUrl}?cache_bust=${new Date().getTime()}`);
                const data = await response.json();
                allLinks = data.links.reverse(); // Guardamos os originais invertidos (mais recentes primeiro)
                renderLinks(allLinks);
            } catch (error) {
                linksWrapper.innerHTML = '<p class="text-center text-red-500 font-bold px-4 py-2 glass-card rounded-xl">Falha na conexão com o Banco de Dados.</p>';
            } finally { loader.classList.add('hidden'); }
        }

        // Lógica da Busca
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allLinks.filter(link => 
                link.titulo.toLowerCase().includes(term) || 
                (link.descricao && link.descricao.toLowerCase().includes(term)) ||
                link.tipo.toLowerCase().includes(term)
            );
            renderLinks(filtered);
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            toggleOverlay(true);
            const formData = new FormData(form);
            try {
                const res = await fetch(googleSheetWebAppUrl, { method: 'POST', body: formData });
                const result = await res.json();
                if (result.status === 'success') { 
                    form.reset(); 
                    await fetchLinks(); 
                }
            } catch (error) { 
                alert(`Erro ao salvar link.`); 
            } finally { 
                toggleOverlay(false); 
            }
        });

        document.addEventListener('DOMContentLoaded', fetchLinks);
        document.getElementById('reload-button').addEventListener('click', fetchLinks);
    </script>
</body>
</html>
