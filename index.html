<body class="bg-mesh min-h-screen text-slate-800 pb-20">
    <div id="loader-overlay">
        <div class="loader-spin"></div>
        <p class="mt-4 text-[10px] font-bold text-blue-600 animate-pulse uppercase tracking-widest">Sincronizando Link...</p>
    </div>

    <div class="container mx-auto max-w-5xl p-6">
        <header class="text-center mt-12 mb-16">
            <img src="https://raw.githubusercontent.com/avatek-m2m/apps-avatek/refs/heads/main/logo-avatek-azul-laranja.png" alt="Logo" class="mx-auto h-12 w-auto mb-6">
            <h1 class="text-3xl font-black italic tracking-tighter text-slate-900 uppercase">Link<span class="text-blue-600">Hub</span></h1>
            <p class="text-slate-400 text-sm font-medium italic mt-2 tracking-wide">Central de recursos e acessos rápidos.</p>
        </header>

        <div class="glass-card p-8 rounded-[2.5rem] shadow-sm mb-16 max-w-2xl mx-auto">
            <h2 class="text-[10px] font-black text-blue-600 uppercase tracking-[0.2em] mb-6 text-center">Adicionar Novo Recurso</h2>
            <form id="add-link-form" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="flex flex-col gap-1">
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Título</label>
                        <input type="text" id="link-title" name="title" placeholder="Ex: Painel" required class="bg-slate-50 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm border-none transition-all">
                    </div>
                    <div class="flex flex-col gap-1 md:col-span-1">
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Tipo</label>
                        <select name="tipo" id="link-tipo" class="bg-slate-50 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm border-none transition-all appearance-none">
                            <option value="Ferramentas">Ferramentas</option>
                            <option value="Documentos">Documentos</option>
                            <option value="Social">Social</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">URL</label>
                        <input type="url" id="link-url" name="url" placeholder="https://..." required class="bg-slate-50 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm border-none transition-all">
                    </div>
                </div>
                <button type="submit" id="submit-button" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl hover:bg-blue-700 shadow-xl shadow-blue-100 transition-all uppercase tracking-widest text-xs">
                    Salvar Link na Base
                </button>
            </form>
        </div>

        <div class="relative">
            <div class="flex justify-between items-center mb-8 border-b border-slate-200 pb-4">
                <h2 class="text-sm font-black text-slate-800 uppercase tracking-widest italic">Recursos Salvos</h2>
                <button id="reload-button" class="p-2 hover:bg-white rounded-xl transition-all text-slate-400 hover:text-blue-600 shadow-sm border border-transparent hover:border-slate-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
                </button>
            </div>
            
            <div id="loader" class="text-center py-20">
                <div class="loader-spin mx-auto"></div>
                <p class="mt-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Consultando Sheets...</p>
            </div>

            <div id="links-container" class="space-y-12"></div>

            <div id="empty-state" class="hidden text-center py-20 glass-card rounded-[2.5rem]">
                <p class="text-slate-400 font-bold italic">Nenhum link catalogado.</p>
            </div>
        </div>
    </div>

    <script>
        const googleSheetWebAppUrl = 'https://script.google.com/macros/s/AKfycby_YfexVrTzjah-xHm2PncNRO3RJcArUGAYBC-HnrHTkCZdqriOqUCVBtoQWDw8vg-G/exec'; 
        const form = document.getElementById('add-link-form');
        const linksContainer = document.getElementById('links-container');
        const loader = document.getElementById('loader');
        const overlay = document.getElementById('loader-overlay');
        const emptyState = document.getElementById('empty-state');

        function toggleOverlay(show) { overlay.style.display = show ? 'flex' : 'none'; }

        function renderLinks(links) {
            linksContainer.innerHTML = '';
            if (links.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            // 1. Agrupar links por Tipo
            const grupos = links.reduce((acc, link) => {
                if (!acc[link.tipo]) acc[link.tipo] = [];
                acc[link.tipo].push(link);
                return acc;
            }, {});

            // 2. Renderizar cada grupo
            for (const tipo in grupos) {
                const section = document.createElement('div');
                section.innerHTML = `
                    <div class="mb-4">
                        <span class="bg-blue-100 text-blue-600 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">${tipo}</span>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6 mb-10">
                        ${grupos[tipo].reverse().map(link => `
                            <a href="${link.url}" target="_blank" rel="noopener noreferrer" 
                               class="group glass-card flex flex-col items-center justify-center p-6 rounded-[2rem] hover:shadow-[0_20px_40px_rgba(59,130,246,0.1)] hover:border-blue-300 transition-all duration-300 aspect-square">
                                <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mb-4 group-hover:bg-blue-600 group-hover:text-white transition-all duration-300">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                                    </svg>
                                </div>
                                <h3 class="font-bold text-[11px] text-slate-800 uppercase tracking-tighter text-center leading-tight break-words w-full">${link.titulo}</h3>
                            </a>
                        `).join('')}
                    </div>
                `;
                linksContainer.appendChild(section);
            }
        }

        async function fetchLinks() {
            loader.classList.remove('hidden');
            linksContainer.innerHTML = '';
            try {
                const response = await fetch(`${googleSheetWebAppUrl}?cache_bust=${new Date().getTime()}`);
                const data = await response.json();
                renderLinks(data.links);
            } catch (error) {
                linksContainer.innerHTML = '<p class="text-center text-red-500 font-bold">Erro de Sincronização.</p>';
            } finally {
                loader.classList.add('hidden');
            }
        }

        async function addLink(event) {
            event.preventDefault();
            toggleOverlay(true);
            const formData = new FormData(form);

            try {
                const response = await fetch(googleSheetWebAppUrl, { method: 'POST', body: formData });
                const result = await response.json();
                if (result.status === 'success') {
                    form.reset();
                    await fetchLinks();
                }
            } catch (error) {
                alert(`Erro ao salvar link.`);
            } finally {
                toggleOverlay(false);
            }
        }

        document.addEventListener('DOMContentLoaded', fetchLinks);
        form.addEventListener('submit', addLink);
        document.getElementById('reload-button').addEventListener('click', fetchLinks);
    </script>
</body>
